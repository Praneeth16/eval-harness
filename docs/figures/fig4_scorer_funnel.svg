<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <marker id="arrAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1600" height="900" fill="#ffffff"/>

  <!-- title + subtitle -->
  <text x="60" y="72" font-family="Charter, Georgia, serif" font-size="34" font-weight="bold" fill="#1f2933">Each scorer layer is blind to a different failure</text>
  <text x="60" y="108" font-family="Charter, Georgia, serif" font-size="17" fill="#1f2933">The layers run cheapest first. The unverified citation looks perfect to the cheapest layer; only the trace catches it.</text>

  <!-- amber token label -->
  <text x="240" y="160" font-family="SF Mono, Menlo, monospace" font-size="15" fill="#d97706" text-anchor="middle">cites SC-7, never verified</text>

  <!-- amber path: down, right into box 1, down, right into box 2 -->
  <line x1="240" y1="172" x2="240" y2="240" stroke="#d97706" stroke-width="2" marker-end="url(#arrAmber)"/>
  <line x1="240" y1="250" x2="468" y2="250" stroke="#d97706" stroke-width="2" marker-end="url(#arrAmber)"/>
  <line x1="240" y1="250" x2="240" y2="380" stroke="#d97706" stroke-width="2"/>
  <line x1="240" y1="380" x2="496" y2="380" stroke="#d97706" stroke-width="2" marker-end="url(#arrAmber)"/>

  <!-- teal stop mark -->
  <text x="524" y="392" font-family="Charter, Georgia, serif" font-size="36" font-weight="bold" fill="#10b981" text-anchor="middle">&#215;</text>

  <!-- box 1: deterministic checks -->
  <rect x="480" y="200" width="640" height="100" rx="10" fill="#ffffff" stroke="#9aa5b1" stroke-width="2"/>
  <text x="800" y="244" font-family="Charter, Georgia, serif" font-size="20" font-weight="bold" fill="#1f2933" text-anchor="middle">1 &#183; Deterministic checks</text>
  <text x="800" y="272" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1" text-anchor="middle">milliseconds &#183; format, budget, ID resolves</text>

  <!-- box 2: trajectory checks (teal accent) -->
  <rect x="480" y="330" width="640" height="100" rx="10" fill="#e7f8f1" stroke="#10b981" stroke-width="2.5"/>
  <text x="800" y="374" font-family="Charter, Georgia, serif" font-size="20" font-weight="bold" fill="#1f2933" text-anchor="middle">2 &#183; Trajectory checks</text>
  <text x="800" y="402" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1" text-anchor="middle">the trace &#183; was every citation verified?</text>

  <!-- box 3: LLM judge (never reached) -->
  <rect x="480" y="460" width="640" height="100" rx="10" fill="#ffffff" stroke="#e4e7eb" stroke-width="2"/>
  <text x="800" y="504" font-family="Charter, Georgia, serif" font-size="20" font-weight="bold" fill="#9aa5b1" text-anchor="middle">3 &#183; LLM judge</text>
  <text x="800" y="532" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1" text-anchor="middle">does the control support the claim?</text>

  <!-- box 4: safety (never reached) -->
  <rect x="480" y="590" width="640" height="100" rx="10" fill="#ffffff" stroke="#e4e7eb" stroke-width="2"/>
  <text x="800" y="634" font-family="Charter, Georgia, serif" font-size="20" font-weight="bold" fill="#9aa5b1" text-anchor="middle">4 &#183; Safety</text>
  <text x="800" y="662" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1" text-anchor="middle">injection, PII, refusal</text>

  <!-- right-side annotations -->
  <text x="1150" y="255" font-family="Charter, Georgia, serif" font-size="15" font-style="italic" fill="#d97706">passes &#183; well-formed, control resolves</text>
  <text x="1150" y="385" font-family="Charter, Georgia, serif" font-size="15" font-style="italic" font-weight="bold" fill="#10b981">stopped &#183; the verifier never ran</text>
  <text x="1150" y="515" font-family="Charter, Georgia, serif" font-size="15" font-style="italic" fill="#9aa5b1">never reached</text>
  <text x="1150" y="645" font-family="Charter, Georgia, serif" font-size="15" font-style="italic" fill="#9aa5b1">never reached</text>

  <!-- footnote -->
  <text x="60" y="852" font-family="Charter, Georgia, serif" font-size="17" fill="#9aa5b1">On the NIST run both agents scored 1.00 on layer 1: every cited control is real. Only layer 2 separates verified from guessed.</text>
</svg>