<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <marker id="ag" viewBox="0 0 9 9" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#9aa5b1"/>
    </marker>
    <marker id="at" viewBox="0 0 9 9" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto-start-reverse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#10b981"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#ffffff"/>

  <!-- Title + subtitle -->
  <text x="60" y="66" font-family="Charter, Georgia, serif" font-size="34" font-weight="bold" fill="#1f2933">One governed system, not a stitch-job</text>
  <text x="60" y="100" font-family="Charter, Georgia, serif" font-size="17" fill="#1f2933">Every component of the eval loop, and every piece of eval evidence, sits inside the same Unity Catalog permission boundary.</text>

  <!-- Unity Catalog boundary -->
  <rect x="60" y="140" width="1480" height="640" rx="10" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="10 7"/>
  <text x="90" y="172" font-family="Charter, Georgia, serif" font-size="19" font-weight="bold" fill="#10b981">Unity Catalog · governance + lineage</text>
  <text x="1512" y="762" text-anchor="end" font-family="SF Mono, Menlo, monospace" font-size="14" fill="#10b981">one permission model, one governed boundary</text>

  <!-- Box 1: NIST -->
  <rect x="115" y="410" width="245" height="80" rx="10" fill="#ffffff" stroke="#9aa5b1" stroke-width="1.5"/>
  <text x="237" y="444" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="19" font-weight="bold" fill="#1f2933">NIST SP 800-53 Rev5</text>
  <text x="237" y="470" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1">public catalog</text>

  <!-- Box 2: Delta tables -->
  <rect x="413" y="410" width="190" height="80" rx="10" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="508" y="444" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="19" font-weight="bold" fill="#1f2933">Delta tables</text>
  <text x="508" y="470" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1">corpus · golden</text>

  <!-- Box 3: AI Search -->
  <rect x="656" y="410" width="240" height="80" rx="10" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="776" y="444" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="19" font-weight="bold" fill="#1f2933">AI Search</text>
  <text x="776" y="470" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1">Delta Sync · gte-large-en</text>

  <!-- Box 4: LangGraph agent -->
  <rect x="949" y="402" width="270" height="96" rx="10" fill="#ffffff" stroke="#1f2933" stroke-width="2"/>
  <text x="1084" y="432" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="19" font-weight="bold" fill="#1f2933">LangGraph agent</text>
  <text x="1084" y="457" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1">parse · classify · retrieve</text>
  <text x="1084" y="477" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1">propose · verify · finalize</text>

  <!-- Box 5: Managed MLflow -->
  <rect x="1272" y="410" width="220" height="80" rx="10" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="1382" y="444" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="19" font-weight="bold" fill="#1f2933">Managed MLflow</text>
  <text x="1382" y="470" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1">traces + CLEAR-S</text>

  <!-- Pipeline arrows -->
  <line x1="363" y1="450" x2="409" y2="450" stroke="#9aa5b1" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="606" y1="450" x2="652" y2="450" stroke="#9aa5b1" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="899" y1="450" x2="945" y2="450" stroke="#9aa5b1" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="1222" y1="450" x2="1268" y2="450" stroke="#9aa5b1" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Foundation Model APIs (above box 4) -->
  <rect x="929" y="195" width="310" height="80" rx="10" fill="#ffffff" stroke="#9aa5b1" stroke-width="1.5"/>
  <text x="1084" y="229" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="19" font-weight="bold" fill="#1f2933">Foundation Model APIs</text>
  <text x="1084" y="255" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1">Claude · GPT · Gemini · Llama · Qwen</text>
  <line x1="1084" y1="282" x2="1084" y2="398" stroke="#9aa5b1" stroke-width="1.5" marker-start="url(#ag)" marker-end="url(#ag)"/>

  <!-- DSPy + GEPA (below box 5) -->
  <rect x="1257" y="595" width="250" height="80" rx="10" fill="#ffffff" stroke="#9aa5b1" stroke-width="1.5"/>
  <text x="1382" y="629" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="19" font-weight="bold" fill="#1f2933">DSPy + GEPA</text>
  <text x="1382" y="655" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" fill="#9aa5b1">optimizer · runs as a Job</text>
  <line x1="1382" y1="497" x2="1382" y2="588" stroke="#9aa5b1" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Teal feedback curve: DSPy + GEPA back to Delta tables -->
  <path d="M 1250 635 C 1040 730, 640 730, 508 503" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#at)"/>
  <text x="855" y="740" text-anchor="middle" font-family="Charter, Georgia, serif" font-size="16" font-style="italic" fill="#10b981">production failures become regression cases</text>

  <!-- Footnote -->
  <text x="60" y="850" font-family="Charter, Georgia, serif" font-size="17" fill="#9aa5b1">Assembled from separate products, every seam between two of these boxes is a governance boundary the eval evidence has to cross.</text>
</svg>